version: "3.9"

services:
  backend:
    profiles: ["prod"]
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: veyron-backend
    env_file:
      - ./backend/.env
      - ./.env.prod
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - app_net

  frontend:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
    container_name: veyron-frontend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - app_net

  redis:
    profiles: ["prod"]
    image: redis:7-alpine
    container_name: veyron-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - app_net

  nginx:
    profiles: ["prod"]
    image: nginx:1.27-alpine
    container_name: veyron-nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/veyron.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_etc:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    restart: unless-stopped
    networks:
      - app_net
      - edge_net

  certbot:
    profiles: ["prod"]
    image: certbot/certbot:latest
    container_name: veyron-certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
    restart: unless-stopped
    networks:
      - edge_net

networks:
  app_net:
    driver: bridge
    internal: true
  edge_net:
    driver: bridge

volumes:
  certbot_etc:
  certbot_www:
  redis_data:
