version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veyron-backend-dev
    env_file:
      - ./backend/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    restart: on-failure
    networks:
      - veyron-dev-net

  frontend:
    image: node:20-alpine
    container_name: veyron-frontend-dev
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "80:3000"
    restart: on-failure
    networks:
      - veyron-dev-net

networks:
  veyron-dev-net:
    driver: bridge
